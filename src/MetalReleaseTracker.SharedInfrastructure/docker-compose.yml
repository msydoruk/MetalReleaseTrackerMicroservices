services:
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: metalrelease-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,OUTSIDE://0.0.0.0:9093,CONTROLLER://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://${PUBLIC_IP:-localhost}:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - '9092:9092'
      - '9093:9093'
    networks:
      - metalrelease_shared_net
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "9092"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: metalrelease-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - metalrelease_shared_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --create --if-not-exists --topic albums-processed-topic --partitions 1 --replication-factor 1 --bootstrap-server kafka:9092
        kafka-topics --create --if-not-exists --topic band-photos-synced-topic --partitions 1 --replication-factor 1 --bootstrap-server kafka:9092
        echo 'Topics created successfully'
    restart: "no"

  minio:
    image: 'minio/minio:latest'
    container_name: metalrelease-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server --address :9001 --console-address :9002 /data
    ports:
      - '9001:9001'
      - '9002:9002'
    volumes:
      - minio_data:/data
    networks:
      - metalrelease_shared_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.145.0
    container_name: metalrelease-otel-collector
    command: ["--config", "/etc/otel-collector-config.yml"]
    volumes:
      - ./otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
    networks:
      - metalrelease_shared_net
    depends_on:
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: metalrelease-loki
    command: ["-config.file=/etc/loki/loki-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    networks:
      - metalrelease_shared_net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: metalrelease-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      - '3000:3000'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - metalrelease_shared_net
    restart: unless-stopped

networks:
  metalrelease_shared_net:
    name: metalrelease_shared_net
    driver: bridge

volumes:
  kafka_data:
    name: metalrelease_kafka_data
  loki_data:
    name: metalrelease_loki_data
  grafana_data:
    name: metalrelease_grafana_data
  minio_data:
    name: metalrelease_minio_data
